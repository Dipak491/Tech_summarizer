<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSummary Pro | Gemini Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full glass p-8 rounded-2xl shadow-2xl">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                DevSummary Pro
            </h1>
            <p class="text-slate-400 mt-2">Powered by Google Gemini AI</p>
        </header>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Gemini API Key</label>
                <input type="password" id="apiKey" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="Enter Gemini Key...">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Input Task Description</label>
                <textarea id="userInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 h-32 focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="I fixed the tree services certificate..."></textarea>
            </div>

            <button onclick="generate()" id="btn" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-lg shadow-lg transform active:scale-95 transition">
                Generate Technical Summary
            </button>

            <div id="outputContainer" class="hidden">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2 text-purple-400">Architect's Summary</label>
                <div id="output" class="bg-black p-4 rounded-lg border border-slate-700 font-mono text-sm leading-relaxed text-purple-300 min-h-[50px]"></div>
            </div>
        </div>
    </div>

    <script>
        // Load saved key
        window.onload = function() {
            const savedKey = localStorage.getItem('gemini_summary_key');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
        };

        async function generate() {
            const key = document.getElementById('apiKey').value.trim();
            const input = document.getElementById('userInput').value.trim();
            const out = document.getElementById('output');
            const outCont = document.getElementById('outputContainer');
            const btn = document.getElementById('btn');

            if (!key || !input) return alert("Key and Input are required!");

            localStorage.setItem('gemini_summary_key', key);
            btn.innerText = "Consulting Gemini...";
            btn.disabled = true;
            outCont.classList.remove('hidden');
            out.innerText = "Analyzing task requirements...";

            // Technical summary instructions
            const prompt = `You are a Senior Software Architect. Translate this casual task into a professional technical summary using industry verbs (e.g. Optimized, Resolved, Refactored, Provisioned). Use bullet points. Task: ${input}`;

            try {
                // Gemini API Endpoint
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    out.innerText = "Gemini Error: " + data.error.message;
                } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                    out.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    out.innerText = "No summary generated. Check your API key limits.";
                }

            } catch (err) {
                out.innerText = "Connection Error: " + err.message;
            } finally {
                btn.innerText = "Generate Technical Summary";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
